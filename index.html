<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<title>2026-2027 精準排班雙模行事曆</title>

<style>
:root{
    --bg-color:#fafafa;
    --card-bg:#ffffff;
    --text-main:#2d3748;
    --text-muted:#a0aec0;

    --color-holiday:#FF5151;
    --color-early:#FFE153;
    --color-early3:#FFAF60;
    --color-late:#0066CC;
    --color-leave:#e2e8f0;
    --color-freeze:#FF9797;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:10px;
    background:var(--bg-color);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--text-main);

    display:flex;
    justify-content:center;
}

.calendar-container{
    width:100%;
    max-width:500px;

    background:var(--card-bg);

    border-radius:16px;

    box-shadow:0 4px 20px rgba(0,0,0,.05);

    padding:16px;

    transition:max-width .3s ease;
}

.calendar-container.yearly-mode{
    max-width:1200px;
}

/* Header */

.calendar-header{
    display:flex;
    justify-content:space-between;
    align-items:center;

    flex-wrap:wrap;

    gap:8px;

    margin-bottom:14px;
}

.current-month{
    font-size:1.2rem;
    font-weight:600;
    letter-spacing:-0.5px;
}

/* Buttons */

.action-btn,
.quick-btn{
    background:#fff;

    border:1px solid #e2e8f0;

    border-radius:6px;

    padding:6px 8px;

    cursor:pointer;

    font-size:.8rem;

    color:var(--text-main);

    transition:.15s;
}

.action-btn:hover,
.quick-btn:hover{
    background:#edf2f7;
}

.quick-btn.active{
    background:#2d3748;
    color:#fff;
    border-color:#2d3748;
    font-weight:600;
}

.quick-btn:disabled{
    opacity:.2;
    cursor:not-allowed;
}

.view-toggle-btn{
    background:#2b6cb0;
    color:#fff;
    border:none;
    font-weight:600;
}

.view-toggle-btn:hover{
    background:#2b5c8f;
}

/* Quick Nav */

.quick-nav-panel{
    background:#f7fafc;

    border:1px solid #edf2f7;

    border-radius:12px;

    padding:10px;

    margin-bottom:14px;
}

.quick-row{
    display:flex;
    flex-wrap:wrap;
    gap:6px;

    margin-bottom:8px;
}

.quick-row:last-child{
    margin-bottom:0;
}

#yearRow .quick-btn{
    flex:1;
}

#monthRow{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:6px;
}

/* Main Render */

.main-render-area{
    display:grid;
    grid-template-columns:1fr;
    gap:20px;
}

.yearly-mode .main-render-area{
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
}

/* Month Card */

.month-title{
    font-size:1rem;
    font-weight:600;

    margin-bottom:8px;

    border-left:4px solid #2d3748;
    padding-left:6px;
}

/* Weekdays */

.weekdays{
    display:grid;
    grid-template-columns:repeat(7,1fr);

    text-align:center;

    font-size:.75rem;
    font-weight:600;

    color:var(--text-muted);

    margin-bottom:8px;
}

/* Days */

.days-grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);

    gap:5px;
}

.day-cell{
    aspect-ratio:1;

    border-radius:8px;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    position:relative;

    font-size:.85rem;
    font-weight:500;

    padding-top:10px;
}

/* Today */

.day-cell.today{
    border:2px solid #2d3748 !important;
    box-shadow:0 0 6px rgba(0,0,0,.1);
}

.day-cell.today::after{
    content:'';

    position:absolute;

    bottom:2px;

    width:3px;
    height:3px;

    border-radius:50%;

    background:#2d3748;
}

.day-cell.today.shift-晚班::after{
    background:#fff;
}

/* Fade */

.day-cell.fade{
    opacity:.12;
}

/* Holiday */

.holiday-label{
    position:absolute;

    top:1px;

    width:100%;

    text-align:center;

    font-size:.5rem;

    color:var(--color-holiday);

    font-weight:bold;

    transform:scale(.75);

    white-space:nowrap;
    overflow:hidden;
}

/* Shift */

.shift-label{
    margin-top:2px;

    font-size:.55rem;

    font-weight:600;
}

.shift-早班{
    background:var(--color-early);
    color:#4A3700;
}

.shift-早班三{
    background:var(--color-early3);
    color:#4A3700;
}

.shift-晚班{
    background:var(--color-late);
    color:#fff;
}

.shift-休假{
    background:var(--color-leave);
    color:#4a5568;
}

.shift-freeze{
    background:var(--color-freeze);
    color:#2d3748;
}

.shift-none{
    background:transparent;
    border:1px solid #edf2f7;
}
</style>
</head>

<body>

<div class="calendar-container" id="container">

    <!-- Header -->
    <div class="calendar-header">

        <div style="display:flex;gap:4px;align-items:center;">
            <button class="action-btn" id="prevBtn">←</button>

            <div class="current-month" id="monthDisplay">
                2026年05月
            </div>

            <button class="action-btn" id="nextBtn">→</button>
        </div>

        <div style="display:flex;gap:4px;">
            <button class="action-btn" id="todayBtn">📍 今天</button>

            <button class="action-btn view-toggle-btn" id="toggleViewBtn">
                📅 全年
            </button>
        </div>

    </div>

    <!-- Quick Nav -->
    <div class="quick-nav-panel" id="quickNavPanel">

        <div class="quick-row" id="yearRow">
            <button class="quick-btn" data-year="2026">2026 年</button>
            <button class="quick-btn" data-year="2027">2027 年</button>
        </div>

        <div id="monthRow"></div>

    </div>

    <!-- Calendar -->
    <div class="main-render-area" id="mainRenderArea"></div>

</div>

<script>

/* Holidays */

const holidays = {

    "2026-06-19":"端午連假",
    "2026-06-20":"端午連假",
    "2026-06-21":"端午連假",

    "2026-09-25":"中秋/教師連假",
    "2026-09-26":"中秋/教師連假",
    "2026-09-27":"中秋/教師連假",
    "2026-09-28":"中秋/教師連假",

    "2026-10-09":"國慶連假",
    "2026-10-10":"國慶連假",
    "2026-10-11":"國慶連假",

    "2026-10-24":"光復連假",
    "2026-10-25":"光復連假",
    "2026-10-26":"光復連假",

    "2026-12-25":"行憲連假",
    "2026-12-26":"行憲連假",
    "2026-12-27":"行憲連假",

    "2027-01-01":"元旦",
    "2027-01-02":"元旦連假",
    "2027-01-03":"元旦連假",

    "2027-02-04":"小年夜",
    "2027-02-05":"除夕",
    "2027-02-06":"初一",
    "2027-02-07":"初二",
    "2027-02-08":"初三",
    "2027-02-09":"初四",
    "2027-02-10":"初五",

    "2027-02-27":"和平連假",
    "2027-02-28":"和平紀念日",
    "2027-03-01":"和平連假",

    "2027-04-03":"清明連假",
    "2027-04-04":"兒童節",
    "2027-04-05":"清明節",
    "2027-04-06":"清明連假",

    "2027-04-30":"勞動連假",
    "2027-05-01":"勞動節",
    "2027-05-02":"勞動連假",

    "2027-06-09":"端午節",

    "2027-09-15":"中秋節",

    "2027-09-28":"教師節",

    "2027-10-09":"國慶連假",
    "2027-10-10":"國慶日",
    "2027-10-11":"國慶連假",

    "2027-10-23":"光復連假",
    "2027-10-24":"光復連假",
    "2027-10-25":"光復紀念日",

    "2027-12-24":"行憲連假",
    "2027-12-25":"行憲紀念日",
    "2027-12-26":"行憲連假",

    "2027-12-31":"元旦補假"
};

/* Shift Cycle */

const shiftCycle = [

    ...Array(4).fill("晚班"),
    ...Array(2).fill("休假"),

    ...Array(4).fill("早班"),
    ...Array(2).fill("休假"),

    ...Array(4).fill("晚班"),
    ...Array(2).fill("休假"),

    "早班",
    "早班",
    "早班三",

    "休假"
];

/* Date Rules */

const startRuleDate = new Date(Date.UTC(2026,4,27));
const endRuleDate   = new Date(Date.UTC(2027,11,31));

const freezeStart = new Date(Date.UTC(2027,1,2));
const freezeEnd   = new Date(Date.UTC(2027,1,11));

/* Today */

const today = new Date();

const todayYear  = today.getFullYear();
const todayMonth = today.getMonth();

const todayStr =
    todayYear + "-" +
    String(todayMonth + 1).padStart(2,"0") + "-" +
    String(today.getDate()).padStart(2,"0");

/* State */

let currentYear =
    (todayYear === 2026 || todayYear === 2027)
        ? todayYear
        : 2026;

let currentMonth =
    (todayYear === 2026 || todayYear === 2027)
        ? todayMonth
        : 4;

let isYearlyView = false;

/* DOM */

const container = document.getElementById("container");

const monthDisplay = document.getElementById("monthDisplay");

const mainRenderArea = document.getElementById("mainRenderArea");

const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");

const todayBtn = document.getElementById("todayBtn");

const toggleViewBtn = document.getElementById("toggleViewBtn");

const quickNavPanel = document.getElementById("quickNavPanel");

const monthRow = document.getElementById("monthRow");

/* Build Month Buttons */

for(let m=0;m<12;m++){

    const btn = document.createElement("button");

    btn.className = "quick-btn";

    btn.dataset.month = m;

    btn.innerText = (m+1)+"月";

    monthRow.appendChild(btn);
}

/* Get Shift */

function getShiftForDate(targetDate){

    if(targetDate < startRuleDate || targetDate > endRuleDate){
        return null;
    }

    if(targetDate >= freezeStart && targetDate <= freezeEnd){
        return "freeze";
    }

    let totalDays = Math.floor(
        (targetDate.getTime() - startRuleDate.getTime()) / 86400000
    );

    if(targetDate > freezeEnd){
        totalDays -= 10;
    }

    return shiftCycle[totalDays % shiftCycle.length];
}

/* Build Month DOM */

function buildMonthDOM(year,month,showTitle){

    const monthCard = document.createElement("div");

    /* Title */

    if(showTitle){

        const title = document.createElement("div");

        title.className = "month-title";

        title.innerText =
            year + "年 " +
            String(month+1).padStart(2,"0") +
            "月";

        monthCard.appendChild(title);
    }

    /* Weekdays */

    const weeksBar = document.createElement("div");

    weeksBar.className = "weekdays";

    weeksBar.innerHTML = `
        <div>日</div>
        <div>一</div>
        <div>二</div>
        <div>三</div>
        <div>四</div>
        <div>五</div>
        <div>六</div>
    `;

    monthCard.appendChild(weeksBar);

    /* Grid */

    const grid = document.createElement("div");

    grid.className = "days-grid";

    const firstDay = new Date(year,month,1);

    const lastDay = new Date(year,month+1,0);

    const startDayOfWeek = firstDay.getDay();

    const totalCells =
        Math.ceil((lastDay.getDate()+startDayOfWeek)/7)*7;

    for(let i=0;i<totalCells;i++){

        const targetDate =
            new Date(year,month,1-startDayOfWeek+i);

        const cell = document.createElement("div");

        cell.className = "day-cell";

        const dateKey =
            targetDate.getFullYear()+"-"+
            String(targetDate.getMonth()+1).padStart(2,"0")+"-"+
            String(targetDate.getDate()).padStart(2,"0");

        /* Today */

        if(dateKey === todayStr){
            cell.classList.add("today");
        }

        /* Other Month */

        if(targetDate.getMonth() !== month){

            cell.classList.add("fade","shift-none");

            cell.innerText = targetDate.getDate();
        }

        /* Current Month */

        else{

            const dateText =
                document.createElement("div");

            dateText.innerText = targetDate.getDate();

            cell.appendChild(dateText);

            /* Holiday */

            if(holidays[dateKey]){

                const holiday = document.createElement("div");

                holiday.className = "holiday-label";

                holiday.innerText = holidays[dateKey];

                cell.appendChild(holiday);
            }

            /* Shift */

            const compareDate = new Date(
                Date.UTC(
                    targetDate.getFullYear(),
                    targetDate.getMonth(),
                    targetDate.getDate()
                )
            );

            const shiftResult =
                getShiftForDate(compareDate);

            if(shiftResult){

                cell.classList.add("shift-"+shiftResult);

                if(shiftResult !== "freeze"){

                    const shift = document.createElement("div");

                    shift.className = "shift-label";

                    shift.innerText =
                        shiftResult === "早班三"
                            ? "早班"
                            : shiftResult;

                    cell.appendChild(shift);
                }
            }
            else{
                cell.classList.add("shift-none");
            }
        }

        grid.appendChild(cell);
    }

    monthCard.appendChild(grid);

    return monthCard;
}

/* UI State */

function updateUIState(){

    quickNavPanel.style.display =
        isYearlyView ? "none" : "block";

    if(isYearlyView){

        container.classList.add("yearly-mode");

        monthDisplay.innerText =
            currentYear + "年 全年度";

        prevBtn.disabled = currentYear === 2026;
        nextBtn.disabled = currentYear === 2027;

        toggleViewBtn.innerText = "單月";
    }

    else{

        container.classList.remove("yearly-mode");

        monthDisplay.innerText =
            currentYear + "年 " +
            String(currentMonth+1).padStart(2,"0") +
            "月";

        prevBtn.disabled =
            currentYear === 2026 &&
            currentMonth === 4;

        nextBtn.disabled =
            currentYear === 2027 &&
            currentMonth === 11;

        toggleViewBtn.innerText = "📅 全年";

        /* Year Active */

        document
            .querySelectorAll("#yearRow .quick-btn")
            .forEach(btn=>{

                btn.classList.toggle(
                    "active",
                    parseInt(btn.dataset.year) === currentYear
                );
            });

        /* Month Active */

        document
            .querySelectorAll("#monthRow .quick-btn")
            .forEach(btn=>{

                const m = parseInt(btn.dataset.month);

                btn.classList.toggle(
                    "active",
                    m === currentMonth
                );

                btn.disabled =
                    currentYear === 2026 && m < 4;
            });
    }
}

/* Render */

function render(){

    mainRenderArea.innerHTML = "";

    if(isYearlyView){

        let startM =
            currentYear === 2026 ? 4 : 0;

        for(let m=startM;m<12;m++){

            mainRenderArea.appendChild(
                buildMonthDOM(currentYear,m,true)
            );
        }
    }

    else{

        mainRenderArea.appendChild(
            buildMonthDOM(currentYear,currentMonth,false)
        );
    }

    updateUIState();
}

/* Toggle View */

toggleViewBtn.addEventListener("click",()=>{

    isYearlyView = !isYearlyView;

    render();
});

/* Prev */

prevBtn.addEventListener("click",()=>{

    if(isYearlyView){

        currentYear--;
    }

    else{

        currentMonth--;

        if(currentMonth < 0){

            currentMonth = 11;

            currentYear--;
        }
    }

    render();
});

/* Next */

nextBtn.addEventListener("click",()=>{

    if(isYearlyView){

        currentYear++;
    }

    else{

        currentMonth++;

        if(currentMonth > 11){

            currentMonth = 0;

            currentYear++;
        }
    }

    render();
});

/* Today */

todayBtn.addEventListener("click",()=>{

    currentYear =
        (todayYear === 2026 || todayYear === 2027)
            ? todayYear
            : 2026;

    currentMonth =
        (todayYear === 2026 || todayYear === 2027)
            ? todayMonth
            : 4;

    isYearlyView = false;

    render();
});

/* Year Buttons */

document
.querySelectorAll("#yearRow .quick-btn")
.forEach(btn=>{

    btn.addEventListener("click",(e)=>{

        let targetY =
            parseInt(e.target.dataset.year);

        if(targetY === 2026 && currentMonth < 4){
            currentMonth = 4;
        }

        renderCalendar(targetY,currentMonth);
    });
});

/* Month Buttons */

document
.querySelectorAll("#monthRow .quick-btn")
.forEach(btn=>{

    btn.addEventListener("click",(e)=>{

        renderCalendar(
            currentYear,
            parseInt(e.target.dataset.month)
        );
    });
});

/* Render Calendar */

function renderCalendar(y,m){

    currentYear = y;
    currentMonth = m;

    isYearlyView = false;

    render();
}

/* Init */

render();

</script>

</body>
</html>
